name: Generate RSS Feed
on:
  schedule:
    # Every 15 minutes, but only between 06:00 and 21:59 UTC (skip nighttime)
    - cron: '*/15 6-21 * * *'
  workflow_dispatch: {}
concurrency:
  group: feed-generation
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: yarn install --frozen-lockfile
      - run: node --experimental-strip-types src/generate.ts
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml feed-state.json
          git diff --staged --quiet || git commit -m "Update feed"
          git push
